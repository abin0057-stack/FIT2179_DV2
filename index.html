<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="main-title">Tourism in Australia</h1>

    <!-- Domestic data section-->
    <section class="box">
        <h2>Domestic</h2>
        <div class="placeholder"></div>
    </section>

    <!-- International data section -->
    <section class="box">
        <h2>International</h2>

        <div class="grid">

            <div class="chart-card">
                <h3>Trips by Country</h3>
                <div id="dumbbellChart" class="chart"></div>
            </div>

            <div class="chart-card">
                <h3>Trip Spend by Reason</h3>
                <div id="barChart" class="chart"></div>
            </div>

            <div class="chart-card">
                <h3>Chart 3</h3>
                <div class="chart"></div>
            </div>

            <div class="chart-card">
                <h3>Chart 4</h3>
                <div class="chart"></div>
            </div>

        </div>
    </section>

    <!-- Tourism COntribution section -->
    <section class="box">
        <h2>Tourism Contribution</h2>

        <div class="contribution-stack">

            <div class="sub-box">
                <h3>Economy</h3>
                <div class="sub-placeholder"></div>
            </div>

            <div class="sub-box">
                <h3>Jobs</h3>
                <div class="sub-placeholder"></div>
            </div>

        </div>
    </section>

    <!-- Vega Library -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <!--Putting charts -->
    <script>
        vegaEmbed('#dumbbellChart', 'Int_1_Dumbbell.json', {
            actions: false,
            width: "container",
            height: 280
        });

        vegaEmbed('#barChart', 'Int_2_BarChart.json', {
            actions: false,
            width: "container",
            height: 280
        });
    </script>

</body>
</html>
